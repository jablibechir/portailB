spring.application.name=portail-recrutement

# -- Profil actif ------------------------------
spring.profiles.active=dev

# -- DataSource PostgreSQL ---------------------
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/recrutement_db}
spring.datasource.username=${DB_USERNAME:bechir}
spring.datasource.password=${DB_PASSWORD:0000}
spring.datasource.driver-class-name=org.postgresql.Driver

# -- JPA / Hibernate ---------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=jablibachir20@gmail.com
spring.mail.password=ccdn nree pbva mmjr
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# -- JWT ---------------------------------------
# Remplacer par une cle HS256 d'au moins 256 bits en production
jwt.secret=${JWT_SECRET:changeme-this-must-be-at-least-32-chars-long!!}
jwt.access-token-expiration-ms=${JWT_ACCESS_EXPIRY:86400000}
jwt.refresh-token-expiration-ms=${JWT_REFRESH_EXPIRY:604800000}

# -- Python Microservice (CV Parsing) ----------
python.service.base-url=${PYTHON_SERVICE_URL:http://localhost:8000}

# -- Logging -----------------------------------
logging.level.com.soprarh=DEBUG
logging.level.org.springframework.security=INFO

# -- Application URL ---------------------------
app.base-url=${APP_BASE_URL:http://localhost:8080}

# -- Upload Photos -----------------------------
app.upload.photos-dir=${PHOTOS_DIR:uploads/photos}

# -- Upload CVs --------------------------------
app.upload.cv-dir=${CV_DIR:uploads/cvs}

# -- CORS --------------------------------------
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# -- Multipart Config --------------------------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

logging.level.com.soprarh=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.mail=DEBUG